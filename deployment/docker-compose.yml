services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama_server
    command: >
      --ctx-size ${LLAMA_CONTEXT_SIZE:-4096}
      --threads 3
      --batch-size 256
      --parallel 1
      --no-mmap
      --chat-template qwen
      --log-disable
      -m /models/${LLAMA_MODEL_FILENAME:-qwen3-4b-instruct-q4_k_m.gguf}
      --mmproj /models/${LLAMA_MMPROJ_FILENAME:-Qwen3.5-4B.BF16-mmproj.gguf}
    volumes:
      - ./models:/models
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '3.0'
    networks:
      - internal_net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: chroma_server
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_AUTH_TOKEN:-change-me}
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
    volumes:
      - ./chroma_data:/chroma/chroma
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '0.5'
    networks:
      - internal_net
    restart: unless-stopped

  app:
    build: ./app
    container_name: custom_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LLAMA_API_URL=http://llama:8080/v1
      - CHROMA_API_URL=http://chromadb:8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-change-me}
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-research_chunks_v1}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-qwen}
      - RETRIEVAL_TOP_K=${RETRIEVAL_TOP_K:-4}
      - MAX_CONTEXT_CHARS=${MAX_CONTEXT_CHARS:-12000}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
    volumes:
      - ../ocr_pipeline:/data/ocr_pipeline:ro
      - ./model_cache:/root/.cache
    depends_on:
      - chromadb
      - llama
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.5'
    networks:
      - internal_net
    restart: unless-stopped

  ingest:
    build: ./app
    profiles:
      - ingest
    command: python ingest.py --input-path /data/ocr_pipeline/chroma_chunks.jsonl --batch-size 256
    environment:
      - CHROMA_API_URL=http://chromadb:8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-change-me}
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-research_chunks_v1}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
    volumes:
      - ../ocr_pipeline:/data/ocr_pipeline:ro
      - ./model_cache:/root/.cache
    depends_on:
      - chromadb
    networks:
      - internal_net

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    profiles:
      - proxy
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal_net
    depends_on:
      - app
    restart: unless-stopped

networks:
  internal_net:
    driver: bridge
