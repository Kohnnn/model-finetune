services:
  # ── Ollama inference server ────────────────────────────────────────────────
  # Model is pulled from your public HF repo on first run.
  # Cached in ollama_data volume — subsequent starts skip re-download.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/root/.ollama/models
      # Model loaded at startup; accessible at http://ollama:11434/v1
      - OLLAMA_MODEL=hf.co/Mikkkkoooo/qwen35-4b-private-analyst-full-corpus
    volumes:
      - ollama_data:/root/.ollama
    # ollama serve stays in foreground, model auto-loaded via OLLAMA_MODEL
    command: serve
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '3.0'
    networks:
      - internal_net
    restart: unless-stopped

  # ── ChromaDB vector store ──────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: chroma_server
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_AUTH_TOKEN:-change-me}
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
    volumes:
      - ./chroma_data:/chroma/chroma
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '0.5'
    networks:
      - internal_net
    restart: unless-stopped

  # ── FastAPI RAG app ────────────────────────────────────────────────────────
  app:
    build: ./app
    container_name: custom_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LLAMA_API_URL=http://ollama:11434/v1
      - CHROMA_API_URL=http://chromadb:8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-change-me}
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-research_chunks_v1}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      # The Ollama model name — matches the HF ref above
      - LLM_MODEL_NAME=qwen3.5-private-analyst
      - RETRIEVAL_TOP_K=${RETRIEVAL_TOP_K:-4}
      - MAX_CONTEXT_CHARS=${MAX_CONTEXT_CHARS:-12000}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
    volumes:
      - ../ocr_pipeline:/data/ocr_pipeline:ro
      - ./model_cache:/root/.cache
    depends_on:
      - chromadb
      - ollama
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.5'
    networks:
      - internal_net
    restart: unless-stopped

  # ── One-shot ChromaDB ingestion ───────────────────────────────────────────
  ingest:
    build: ./app
    profiles:
      - ingest
    command: python ingest.py --input-path /data/ocr_pipeline/chroma_chunks.jsonl --batch-size 256
    environment:
      - CHROMA_API_URL=http://chromadb:8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-change-me}
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-research_chunks_v1}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
    volumes:
      - ../ocr_pipeline:/data/ocr_pipeline:ro
      - ./model_cache:/root/.cache
    depends_on:
      - chromadb
    networks:
      - internal_net

  # ── Optional TLS reverse proxy ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    profiles:
      - proxy
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal_net
    depends_on:
      - app
    restart: unless-stopped

networks:
  internal_net:
    driver: bridge

volumes:
  ollama_data:
